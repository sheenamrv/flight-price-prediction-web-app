<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="min-h-screen bg-gradient-to-b from-blue-900 via-blue-500 to-sky-200 text-white"
  >
    <div class="relative min-h-screen px-6 md:px-12 py-8 flex-col">
      <div class="flex items-center justify-between mb-16">
        <div class="text-xl font-semibold flex items-center gap-2">
          <a href="{% url 'landing' %}">Flight Fare Forecast</a>
        </div>
      </div>

      <!-- Page Title -->
      <div class="text-center max-w-2xl mx-auto mb-12">
        <h1
          class="text-3xl md:text-5xl font-semibold leading-tight mb-4 drop-shadow-lg"
        >
          Search Flights
        </h1>
        <p class="text-sm opacity-80">
          Find the best fares from our top airports using smart predictions.
        </p>
      </div>

      <!-- Search Form -->
      <div
        class="max-w-5xl mx-auto bg-white/10 backdrop-blur-md rounded-2xl p-8 shadow-lg"
      >
        <form action="#" class="grid gap-6 md:grid-cols-5 items-end">
          <div class="flex flex-col">
            <label class="mb-1 text-sm font-medium">Origin</label>
            <select name="origin" class="rounded-lg px-3 py-2 text-black">
              <option value="">Select Origin</option>
              <option value="YOW">Ottawa (YOW)</option>
              <option value="YYZ">Toronto (YYZ)</option>
              <option value="YYC">Calgary (YYC)</option>
              <option value="YVR">Vancouver (YVR)</option>
            </select>
          </div>

          <div class="flex flex-col">
            <label class="mb-1 text-sm font-medium">Destination</label>
            <select name="destination" class="rounded-lg px-3 py-2 text-black">
              <option value="">Select Destination</option>
              <option value="YOW">Ottawa (YOW)</option>
              <option value="YYZ">Toronto (YYZ)</option>
              <option value="YYC">Calgary (YYC)</option>
              <option value="YVR">Vancouver (YVR)</option>
            </select>
          </div>

          <div class="flex flex-col">
            <label class="mb-1 text-sm font-medium">From</label>
            <input
              type="date"
              name="from_date"
              class="rounded-lg px-3 py-2 text-black"
            />
          </div>

          <div class="flex flex-col">
            <label class="mb-1 text-sm font-medium">To</label>
            <input
              type="date"
              name="to_date"
              class="rounded-lg px-3 py-2 text-black"
            />
          </div>

          <!-- Search Button -->
          <div class="flex justify-start md:justify-end">
            <button
              type="submit"
              class="bg-sky-400 hover:bg-sky-500 text-white font-semibold px-6 py-3 rounded-full shadow-lg transition-colors"
            >
              Search Flights
            </button>
          </div>
        </form>
      </div>

      <!-- Airplane Graphic -->
      <div class="relative flex justify-center items-center mt-16">
        {% load static %}
        <img
          src="{% static 'flights/images/Flight.svg' %}"
          alt="Airplane"
          class="w-full max-w-sm md:max-w-md object-contain drop-shadow-2xl"
        />
        <div class="absolute inset-0 pointer-events-none">
          <div
            class="absolute w-72 h-72 border border-white/30 rounded-full left-10 top-10"
          ></div>
          <div
            class="absolute w-96 h-96 border border-white/20 rounded-full right-10 bottom-10"
          ></div>
        </div>
      </div>
    </div>
  </body>
</html>
